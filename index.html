<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaoru Hana - Anime</title>
    <style>
        /* Resetando alguns estilos padrão */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Estilo básico do corpo da página */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            background-image: url('https://via.placeholder.com/1500x1000/0000FF/808080?Text=Kaoru+Hana'); /* Imagem de fundo */
            background-size: cover;
            background-position: center;
        }

        .content {
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 30px;
            border-radius: 10px;
            width: 60%;
            max-width: 600px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px 30px;
            background-color: #f56b00;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #f29c11;
        }

        /* Animação de entrada da página */
        .fadeIn {
            animation: fadeInAnimation 2s ease-out forwards;
        }

        @keyframes fadeInAnimation {
            0% {
                opacity: 0;
                transform: translateY(-50px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="content fadeIn">
        <h1>Kaoru Hana</h1>
        <p>Kaoru Hana é uma obra de anime que combina ação, romance e mistério. A história segue a jornada de Kaoru, um jovem com um passado misterioso, enquanto ele enfrenta inimigos e busca por respostas sobre seu destino.</p>
        <p>Prepare-se para aventuras intensas e momentos emocionantes!</p>
        <button class="btn" onclick="mostrarDetalhes()">Ver Detalhes</button>
    </div>

    <script>
        // Função que mostra mais detalhes sobre o anime
        function mostrarDetalhes() {
            alert('Kaoru Hana foi lançado no Japão em 2025 e rapidamente se tornou um sucesso entre os fãs de anime. A série tem uma narrativa envolvente, personagens carismáticos e um enredo cheio de reviravoltas inesperadas!');
        }
    </script>

</body>
</html>
